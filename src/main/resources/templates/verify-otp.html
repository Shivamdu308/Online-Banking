<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MyBank | Verify OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Segoe UI';
    background: url('https://images.unsplash.com/photo-1556740749-887f6717d7e4')
                no-repeat center/cover;
}

/* OVERLAY */
.overlay {
    min-height:100vh;
    background: rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card-box {
    width:100%;
    max-width:380px;
    padding:30px;
    border-radius:20px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    color:white;
}

/* BRAND */
.brand {
    text-align:center;
    margin-bottom:15px;
}

.brand i {
    font-size:35px;
    color:#00c6ff;
}

/* INPUT */
.form-control {
    background: rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}

.form-control:focus {
    box-shadow:0 0 8px #00c6ff;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    border:none;
}

/* TIMER */
.timer {
    font-size:13px;
    text-align:center;
    margin-bottom:10px;
    opacity:0.8;
}

/* RESEND */
.resend {
    text-align:center;
    font-size:13px;
    margin-top:10px;
}

.resend a {
    color:#00c6ff;
    cursor:pointer;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card-box">

<!-- HEADER -->
<div class="brand">
    <i class="fas fa-shield-alt"></i>
    <h4>Verify OTP</h4>
    <p class="small">Enter OTP sent to your email</p>
</div>

<!-- TIMER -->
<div class="timer">
    ⏱ OTP expires in <span id="time">120</span> sec
</div>

<!-- ALERTS -->
<div th:if="${error}" class="alert alert-danger py-2 text-center small">
    <span th:text="${error}"></span>
</div>

<div th:if="${success}" class="alert alert-success py-2 text-center small">
    <span th:text="${success}"></span>
</div>

<!-- FORM -->
<form th:action="@{/verify-otp}" method="post">

    <div class="mb-3">
        <input type="text" name="otp" maxlength="6"
               class="form-control text-center"
               placeholder="Enter OTP"
               required autofocus>
    </div>

    <div class="mb-3">
        <input type="password" name="newPin" maxlength="4"
               class="form-control text-center"
               placeholder="New 4-digit PIN"
               required>
    </div>

    <button class="btn btn-primary w-100">
        <i class="fas fa-check-circle"></i> Verify & Reset
    </button>

</form>

<!-- RESEND -->
<div class="resend">
    Didn't get OTP?
    <a onclick="resendOtp()" id="resendBtn">Resend</a>
</div>

<!-- BACK -->
<div class="text-center mt-3">
    <a th:href="@{/login}">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>
</div>

</div>
</div>

<!-- JS -->
<script>

// TIMER
let time = 120;
let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
        clearInterval(timer);
        document.getElementById("time").innerText = "Expired";
    }
}, 1000);

// RESEND OTP
function resendOtp(){
    let btn = document.getElementById("resendBtn");

    btn.innerText = "Sending...";
    btn.style.pointerEvents = "none";

    fetch("/send-otp", {
        method:"POST"
    }).then(()=>{
        btn.innerText = "OTP Sent!";
        setTimeout(()=>{
            btn.innerText = "Resend";
            btn.style.pointerEvents = "auto";
        },5000);
    });
}

</script>

</body>
</html>
