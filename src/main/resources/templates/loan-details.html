<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Loan Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#020617,#0f172a);
    font-family:'Segoe UI';
    color:white;
}

.container-box{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.loan-card{
    width:450px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.status{
    padding:6px 15px;
    border-radius:20px;
    font-size:13px;
}
.approved{ background:#16a34a; }
.pending{ background:#f59e0b; }
.rejected{ background:#dc2626; }

.btn-action{
    width:100%;
    margin-top:10px;
    border-radius:25px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    border:none;
    padding:10px;
    color:white;
}
.btn-action:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00c6ff;
}
</style>
</head>

<body>

<div class="container-box">
<div class="loan-card">

<h4 class="text-center mb-3">🏦 Loan Details</h4>

<!-- ❌ ERROR MESSAGE -->
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<!-- ✅ DATA -->
<div th:if="${loan != null}">

<p>Loan Amount: ₹ <b th:text="${loan.amount}">500000</b></p>
<p>Loan Type: <b th:text="${loan.type}">Home Loan</b></p>
<p>Tenure: <b th:text="${loan.tenure}">60</b> Months</p>
<p>Interest Rate: <b th:text="${loan.interestRate}">8</b>%</p>

<hr>

<p>Status: 
<span class="status"
      th:classappend="${loan.status.name() == 'APPROVED'} ? 'approved' :
                      (${loan.status.name() == 'PENDING'} ? 'pending' : 'rejected')"
      th:text="${loan.status.displayName}">
</span>
</p>

<!-- 🔥 EMI INFO -->
<p>Monthly EMI: ₹ 
    <b th:text="${loan.emiAmount != null ? loan.emiAmount : loan.calculateEMI()}">
        10500
    </b>
</p>

<p>Next Due Date: 
    <b th:text="${loan.nextDueDate != null ? loan.nextDueDate : 'N/A'}">
        10 May 2026
    </b>
</p>

</div>

<!-- ❌ NO LOAN -->
<div th:if="${loan == null}">
    <p>No loan found.</p>
</div>

<!-- ✅ BUTTON -->
<button class="btn btn-action"
        th:if="${loan != null && loan.status.name() == 'APPROVED'}"
        onclick="window.location.href='/loan/emi'">
    💳 Pay EMI
</button>

<button class="btn btn-action"
        onclick="window.location.href='/dashboard'">
    ⬅ Back to Dashboard
</button>

</div>
</div>

</body>
</html>
