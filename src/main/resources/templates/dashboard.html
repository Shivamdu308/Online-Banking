<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>MyBank Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
    background:#020617;
    color:#e2e8f0;
}

/* SIDEBAR */
.sidebar {
    width:230px;
    height:100vh;
    position:fixed;
    background:#020617;
    padding:20px;
    border-right:1px solid rgba(148,163,184,0.1);
}

.sidebar h4 {
    color:#00c6ff;
    margin-bottom:30px;
}

.sidebar a {
    display:block;
    padding:10px;
    color:#94a3b8;
    text-decoration:none;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar a:hover {
    background:#1e293b;
    color:white;
}

/* MAIN */
.main {
    margin-left:230px;
    padding:20px;
}

/* CARD */
.glass {
    background: rgba(15,23,42,0.8);
    border-radius:18px;
    backdrop-filter: blur(20px);
    border:1px solid rgba(148,163,184,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.balance {
    padding:20px;
    text-align:center;
}

.table { color:#e2e8f0; }
.table tr:hover { background:rgba(255,255,255,0.05); }

.credit { color:#22c55e; }
.debit { color:#ef4444; }
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🏦 MyBank</h4>

    <a th:href="@{/dashboard}">🏠 Dashboard</a>
    <a th:href="@{/deposit}">💰 Deposit</a>
    <a th:href="@{/withdraw}">💸 Withdraw</a>
    <a th:href="@{/transfer}">🔄 Transfer</a>
    <a th:href="@{/passbook}">📘 Passbook</a>
    <a th:href="@{/card}">💳 ATM Card</a>
    <a th:href="@{/transactions}">📄 Transactions</a>
    <a th:href="@{/loan/apply}">🏦 Loan</a>

    <div class="mt-3">
        <a href="/loan/details" class="btn btn-info btn-sm">Loan Details</a>

        <!-- ✅ SAFE EMI BUTTON -->
        <a th:if="${loan != null and loan.status != null and loan.status.name() == 'APPROVED'}"
           href="/loan/emi"
           class="btn btn-success btn-sm">
            💳 Pay EMI
        </a>
    </div>

    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h4>
Welcome,
<span th:text="${userName != null ? userName : 'User'}"></span> 👋
</h4>

<!-- BALANCE -->
<div class="row mb-4">

    <div class="col-md-3">
        <div class="glass balance">
            <h6>Savings</h6>
            <h2 th:text="'₹ ' + (${savingsBalance} != null ? ${savingsBalance} : 0)"></h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="glass balance">
            <h6>Current</h6>
            <h2 th:text="'₹ ' + (${currentBalance} != null ? ${currentBalance} : 0)"></h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="glass balance">
            <h6>Total Credit</h6>
            <h2 class="credit" th:text="'₹ ' + (${totalCredit} != null ? ${totalCredit} : 0)"></h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="glass balance">
            <h6>Total Debit</h6>
            <h2 class="debit" th:text="'₹ ' + (${totalDebit} != null ? ${totalDebit} : 0)"></h2>
        </div>
    </div>

</div>

<!-- LOAN -->
<div class="glass p-4 mb-4">

<h5>🏦 Loan Status</h5>

<div th:if="${loan != null}">
    <p>Type: <b th:text="${loan.type != null ? loan.type : '-'}"></b></p>
    <p>Amount: <b th:text="'₹ ' + (${loan.amount} != null ? ${loan.amount} : 0)"></b></p>

    <p>
        Status:
        <span
            th:text="${loan.status != null ? loan.status : 'N/A'}"
            th:classappend="
                ${loan.status != null and loan.status.name()=='PENDING'} ? 'badge bg-warning text-dark' :
                (${loan.status != null and loan.status.name()=='APPROVED'} ? 'badge bg-success' : 'badge bg-danger')">
        </span>
    </p>
</div>

<div th:if="${loan == null}">
    <p>No Loan Applied</p>
</div>

</div>

<!-- CHART -->
<div class="glass p-4 mb-4">
    <h5>📊 Analytics</h5>
    <canvas id="chart"></canvas>
</div>

<!-- TRANSACTIONS -->
<div class="glass p-4">

<h5>Recent Transactions</h5>

<table class="table table-borderless mt-3">
<tr>
    <th>Date</th>
    <th>Type</th>
    <th>Amount</th>
</tr>

<tr th:each="txn : ${recentTransactions != null ? recentTransactions : {}}">
    <td th:text="${txn.timestamp != null ? #temporals.format(txn.timestamp,'dd-MM-yyyy HH:mm') : '-'}"></td>
    <td th:text="${txn.type != null ? txn.type : '-'}"></td>
    <td th:text="'₹ ' + (${txn.amount} != null ? txn.amount : 0)"
        th:classappend="${txn.type == 'CREDIT'} ? 'credit' : 'debit'">
    </td>
</tr>

</table>

</div>

</div>

<!-- CHART -->
<script>
new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: ["Jan","Feb","Mar","Apr","May"],
        datasets: [{
            label: 'Transactions',
            data: [1000,2000,1500,2500,1800],
            borderColor: '#00c6ff',
            backgroundColor: 'rgba(0,198,255,0.2)',
            fill: true,
            tension: 0.4
        }]
    }
});
</script>

</body>
</html>
