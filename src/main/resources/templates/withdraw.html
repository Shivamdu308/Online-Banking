<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Withdraw Money | MyBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc') no-repeat center/cover;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.85);
}

/* CENTER */
.container-box {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* GLASS CARD */
.withdraw-card {
    width: 380px;
    padding: 35px;
    border-radius: 25px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(239, 68, 68, 0.3);
    box-shadow: 0 25px 70px rgba(0,0,0,0.9);
    color: white;
    transition: 0.3s;
}

.withdraw-card:hover {
    transform: translateY(-4px);
}

/* TITLE */
.title {
    text-align: center;
    margin-bottom: 20px;
}

.title h3 {
    background: linear-gradient(135deg,#ff4b5c,#ff0000);
    -webkit-background-clip: text;
    color: transparent;
}

/* INPUT */
.form-control {
    border-radius: 50px;
    background: rgba(2,6,23,0.9);
    border: 1px solid rgba(148,163,184,0.3);
    color: white;
    padding: 10px 15px;
}

.form-control:focus {
    border-color: #ef4444;
    box-shadow: 0 0 10px #ef4444;
}

/* BUTTON */
.btn-withdraw {
    width: 100%;
    border-radius: 50px;
    background: linear-gradient(135deg,#ff4b5c,#ff0000);
    border: none;
    padding: 10px;
    font-weight: 500;
}

.btn-withdraw:hover {
    box-shadow: 0 0 20px #ff4b5c;
}

/* BACK */
.back-link {
    text-align: center;
    margin-top: 15px;
}

.back-link a {
    color: #f87171;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="container-box">

<div class="withdraw-card">

    <div class="title">
        <h3>💸 Withdraw Money</h3>
        <small>Secure banking transaction</small>
    </div>

    <form th:action="@{/withdraw}" method="post">

        <input type="number"
               name="amount"
               class="form-control mb-3"
               placeholder="Enter Amount"
               required>

        <button class="btn btn-withdraw">
            Withdraw Now →
        </button>

    </form>

    <div class="back-link">
        <a th:href="@{/dashboard}">← Back to Dashboard</a>
    </div>

</div>

</div>

</body>
</html>
