<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>MyBank Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI';
    height:100vh;

    background:url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d')
    no-repeat center center/cover;
}

.container-box{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.signup-card{

    width:430px;

    padding:35px;

    border-radius:24px;

    background:rgba(15,23,42,0.88);

    backdrop-filter:blur(25px);

    box-shadow:0 20px 60px rgba(0,0,0,0.9);

    color:white;
}

.brand{
    text-align:center;
    margin-bottom:20px;
}

.brand i{

    font-size:30px;

    background:linear-gradient(45deg,#00c6ff,#0072ff);

    padding:15px;

    border-radius:50%;

    box-shadow:0 0 15px #38bdf8;
}

.form-control{

    background:#020617;

    border-radius:50px;

    border:1px solid #334155;

    color:white;

    padding:12px 15px;
}

.form-control::placeholder{
    color:#9ca3af;
}

.form-control:focus{

    border-color:#38bdf8;

    box-shadow:0 0 12px #38bdf8;
}

.btn-signup{

    width:100%;

    padding:12px;

    border:none;

    border-radius:50px;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    color:white;

    transition:0.3s;
}

.btn-signup:hover{

    transform:translateY(-2px);

    box-shadow:0 0 20px #38bdf8;
}

.link{

    text-align:center;

    font-size:13px;
}

.link a{

    color:#38bdf8;

    text-decoration:none;
}

.toggle-box{

    display:flex;

    background:#020617;

    border-radius:50px;

    overflow:hidden;

    margin-bottom:20px;

    border:1px solid #334155;
}

.toggle-btn{

    width:50%;

    padding:10px;

    border:none;

    background:transparent;

    color:white;

    transition:0.3s;
}

.toggle-btn.active{

    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

#adminForm{

    display:none;
}

@media(max-width:768px){

.signup-card{

    width:90%;

    padding:25px;
}

}

</style>

</head>

<body>

<div class="container-box">

<div class="signup-card">

    <div class="brand">

        <i class="fas fa-university"></i>

        <h3>MyBank</h3>

        <p style="font-size:13px;opacity:0.8;">

            Create your secure account

        </p>

    </div>

    <!-- TOGGLE -->

    <div class="toggle-box">

        <button type="button"
                class="toggle-btn active"
                id="userBtn"
                onclick="setRole('USER')">

            User Signup

        </button>

        <button type="button"
                class="toggle-btn"
                id="adminBtn"
                onclick="setRole('ADMIN')">

            Admin Signup

        </button>

    </div>

    <!-- ================= USER FORM ================= -->

    <form id="userForm"
          th:action="@{/signup}"
          method="post">

        <input type="hidden"
               name="role"
               value="USER">

        <input type="text"
               class="form-control mb-3"
               name="name"
               placeholder="Full Name"
               required>

        <input type="text"
               class="form-control mb-3"
               name="mobile"
               placeholder="Mobile Number"
               required>

        <input type="email"
               class="form-control mb-3"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               inputmode="numeric"
               pattern="[0-9]{4}"
               maxlength="4"
               class="form-control mb-2"
               name="pin"
               placeholder="Create 4 Digit PIN"
               required>

        <small style="color:#9ca3af;font-size:11px;">

            PIN must be exactly 4 digits

        </small>

        <button class="btn-signup mt-3">

            User Sign Up →

        </button>

    </form>

    <!-- ================= ADMIN FORM ================= -->

    <form id="adminForm"
          th:action="@{/signup}"
          method="post">

        <input type="hidden"
               name="role"
               value="ADMIN">

        <input type="text"
               class="form-control mb-3"
               name="name"
               placeholder="Admin Name"
               required>

        <input type="text"
               class="form-control mb-3"
               name="mobile"
               placeholder="Admin Mobile Number"
               required>

        <input type="email"
               class="form-control mb-3"
               name="email"
               placeholder="Admin Email"
               required>

        <input type="text"
               class="form-control mb-3"
               name="adminId"
               placeholder="Create Admin ID"
               required>

        <input type="password"
               class="form-control mb-3"
               name="adminPassword"
               placeholder="Create Admin Password"
               required>

        <button class="btn-signup mt-3">

            Admin Sign Up →

        </button>

    </form>

    <div class="link mt-3">

        Already have an account?

        <a th:href="@{/login}">Login</a>

    </div>

</div>

</div>

<!-- SCRIPT -->

<script>

function setRole(role){

    let userForm =
        document.getElementById("userForm");

    let adminForm =
        document.getElementById("adminForm");

    let userBtn =
        document.getElementById("userBtn");

    let adminBtn =
        document.getElementById("adminBtn");

    if(role === "USER"){

        userForm.style.display = "block";

        adminForm.style.display = "none";

        userBtn.classList.add("active");

        adminBtn.classList.remove("active");

    }else{

        userForm.style.display = "none";

        adminForm.style.display = "block";

        adminBtn.classList.add("active");

        userBtn.classList.remove("active");
    }
}

</script>

</body>

</html>
