<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Apply Loan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* CENTER */
.container-box {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* FLIP CARD */
.flip-card {
    width:420px;
    height:540px;
    perspective:1000px;
}

.flip-inner {
    width:100%;
    height:100%;
    transition:0.7s;
    transform-style: preserve-3d;
    position:relative;
}

.flip-inner.active {
    transform: rotateY(180deg);
}

/* FRONT & BACK */
.card-face {
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:20px;
    padding:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.card-back {
    transform: rotateY(180deg);
}

/* INPUT */
.form-control, .form-select {
    background:rgba(255,255,255,0.1);
    border:none;
    color:white;
}

.form-control::placeholder {
    color:#ccc;
}

.form-control:focus, .form-select:focus {
    box-shadow:0 0 10px #00c6ff;
}

/* BUTTON */
.btn-apply, .btn-flip {
    width:100%;
    border-radius:25px;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    border:none;
    padding:10px;
    transition:0.3s;
    color:white;
}

.btn-apply:hover, .btn-flip:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #00c6ff;
}

/* EMI RESULT */
.emi-box {
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.small-text {
    font-size:13px;
    opacity:0.7;
}

</style>

</head>

<body>

<div class="container-box">

<div class="flip-card">
<div class="flip-inner" id="flipCard">

<!-- FRONT SIDE -->
<div class="card-face">

<h4 class="text-center mb-3">🏦 Loan Application</h4>
<p class="text-center small-text">Fill details to request loan</p>

<form th:action="@{/loan/apply}" method="post">

<input id="amount" type="number" name="amount" class="form-control mb-3"
       placeholder="Enter Loan Amount" required>

<select id="loanType" name="type" class="form-select mb-3">
<option value="home">Home Loan</option>
<option value="personal">Personal Loan</option>
<option value="education">Education Loan</option>
</select>

<input type="text" name="income" class="form-control mb-3"
       placeholder="Monthly Income" required>

<input type="text" name="employment" class="form-control mb-3"
       placeholder="Employment Type" required>

<input id="tenure" type="number" name="tenure" class="form-control mb-3"
       placeholder="Loan Tenure (Months)" required>

<input id="rate" type="number" class="form-control mb-3"
       placeholder="Interest Rate (%)">

<button type="button" onclick="flipCard()" class="btn btn-flip mb-2">
Check EMI →
</button>

<button class="btn btn-apply">Apply Loan</button>

</form>

<div class="text-center mt-3">
<a href="/dashboard" style="color:#8fd4ff;">← Back</a>
</div>

</div>

<!-- BACK SIDE -->
<div class="card-face card-back">

<h4 class="text-center mb-3">💰 EMI Details</h4>

<div class="emi-box">

<p>Loan: ₹ <b id="pAmt">0</b></p>
<p>Tenure: <b id="pTenure">0</b> months</p>

<h2 id="emi">₹ 0</h2>
<p class="small-text">Monthly EMI</p>

<hr>

<p>Total Payment: ₹ <b id="total">0</b></p>
<p>Interest: ₹ <b id="interest">0</b></p>

</div>

<button onclick="flipBack()" class="btn btn-flip mt-3">
← Back to Form
</button>

</div>

</div>
</div>

</div>

<script>

// Flip control
function flipCard(){
    calculateEMI();
    document.getElementById("flipCard").classList.add("active");
}

function flipBack(){
    document.getElementById("flipCard").classList.remove("active");
}

// Auto interest based on loan type
document.getElementById("loanType").addEventListener("change", function(){
    let type = this.value;
    let rateField = document.getElementById("rate");

    if(type === "home") rateField.value = 8;
    else if(type === "personal") rateField.value = 12;
    else if(type === "education") rateField.value = 7;
});

// EMI calculation
function calculateEMI() {

let P = parseFloat(document.getElementById("amount").value);
let R = parseFloat(document.getElementById("rate").value)/12/100;
let N = parseInt(document.getElementById("tenure").value);

if(!P || !R || !N){
document.getElementById("emi").innerText="₹ 0";
return;
}

let emi = (P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
let total = emi * N;
let interest = total - P;

document.getElementById("emi").innerText="₹ "+Math.round(emi);
document.getElementById("pAmt").innerText=P;
document.getElementById("pTenure").innerText=N;
document.getElementById("total").innerText=Math.round(total);
document.getElementById("interest").innerText=Math.round(interest);

}

</script>

</body>
</html>
