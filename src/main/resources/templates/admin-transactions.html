<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Transactions | MyBank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#020617;
    color:#e2e8f0;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    height:100vh;
    position:fixed;
    background:#020617;
    padding:20px;
    border-right:1px solid rgba(148,163,184,0.1);
}

.sidebar h4 { color:#00c6ff; margin-bottom:30px; }

.sidebar a {
    display:block;
    padding:10px;
    color:#94a3b8;
    text-decoration:none;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar a:hover {
    background:#1e293b;
    color:white;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:20px;
}

/* GLASS */
.glass {
    background: rgba(15,23,42,0.8);
    border-radius:18px;
    backdrop-filter: blur(20px);
    border:1px solid rgba(148,163,184,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TABLE */
.table { color:#e2e8f0; }
.table tbody tr:hover {
    background:rgba(255,255,255,0.05);
}

/* COLORS */
.credit { color:#22c55e; font-weight:bold; }
.debit { color:#ef4444; font-weight:bold; }
.transfer { color:#38bdf8; font-weight:bold; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🏦 Admin</h4>
    <a href="/admin/dashboard">🏠 Dashboard</a>
    <a href="/admin/transactions">🧾 Transactions</a>
    <a href="/admin/export">📥 Export</a>
    <a href="/admin/loans">🏦 Loan Requests</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="glass p-4">

<h4 class="mb-3">📄 All Transactions</h4>

<table class="table table-borderless" id="txnTable">

<thead>
<tr>
    <th>User</th>
    <th>Account</th>
    <th>Type</th>
    <th>Amount</th>
    <th>Description</th>
    <th>Date</th>
</tr>
</thead>

<tbody>

<tr th:each="txn : ${transactions}">

    <!-- USER -->
    <td th:text="${txn.fromAccount != null and txn.fromAccount.user != null ? txn.fromAccount.user.name : 'N/A'}"></td>

    <!-- ACCOUNT -->
    <td th:text="${txn.fromAccount != null ? txn.fromAccount.accountNumber : '-'}"></td>

    <!-- TYPE -->
    <td th:text="${txn.type}"
        th:classappend="${txn.type != null and txn.type.name()=='CREDIT'} ? ' credit' :
                        (${txn.type != null and txn.type.name()=='DEBIT'} ? ' debit' : ' transfer')">
    </td>

    <!-- AMOUNT (FIXED) -->
    <td th:text="${txn.amount != null ? '₹ ' + txn.amount : '₹ 0'}"></td>

    <!-- DESC -->
    <td th:text="${txn.description != null ? txn.description : '-'}"></td>

    <!-- DATE -->
    <td th:text="${txn.timestamp != null ? #temporals.format(txn.timestamp, 'dd-MM-yyyy HH:mm') : '-'}"></td>

</tr>

<tr th:if="${transactions == null or #lists.isEmpty(transactions)}">
    <td colspan="6" class="text-center">No Transactions Found</td>
</tr>

</tbody>
</table>

</div>

</div>

</body>
</html>
