<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>EMI Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#020617,#0f172a);
    font-family:'Segoe UI';
    color:white;
}

.container-box{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.emi-card{
    width:420px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.qr-box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.btn-pay{
    width:100%;
    margin-top:15px;
    border-radius:25px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    border:none;
    padding:10px;
    color:white;
}
.btn-pay:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00c6ff;
}

.small{
    font-size:13px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container-box">

<div class="emi-card">

<h4 class="text-center mb-3">💳 EMI Payment</h4>

<!-- ✅ SUCCESS / ERROR -->
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<!-- ❌ NO LOAN -->
<div th:if="${loan == null}">
    <p class="text-danger text-center">❌ No approved loan found</p>
</div>

<!-- ✅ LOAN DATA -->
<div th:if="${loan != null}">

<div class="qr-box">
<p>Loan: ₹ <b th:text="${loan.amount}">500000</b></p>

<p>EMI: ₹ 
<b th:text="${loan.emiAmount != null ? loan.emiAmount : 0}">
10500
</b>
</p>

<p>Due Date: 
<b th:text="${loan.nextDueDate != null ? loan.nextDueDate : 'N/A'}">
10 May 2026
</b>
</p>
</div>

<!-- QR -->
<div class="qr-box mt-3">
<p class="small">Scan to Pay (UPI)</p>

<img th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + ${qrData}}" 
     width="180">
</div>

<!-- PAY BUTTON -->
<form action="/loan/pay-emi" method="post">
    <button class="btn btn-pay">💳 Pay Now</button>
</form>

</div>

<!-- BACK -->
<a href="/dashboard">
    <button class="btn btn-pay">⬅ Back</button>
</a>

</div>

</div>

</body>
</html>
