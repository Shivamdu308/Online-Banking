<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>MyBank | Open Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
    color:white;
}

/* CENTER */
.wrapper {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* GLASS CARD */
.card-box {
    width:100%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
    animation: fadeIn 0.8s ease;
}

/* HEADER */
.brand {
    text-align:center;
    margin-bottom:20px;
}
.brand i {
    font-size:35px;
    color:#00c6ff;
}

/* INPUT */
.form-control {
    background: rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}
.form-control:focus {
    box-shadow:0 0 8px #00c6ff;
}

/* BUTTON */
.btn-pro {
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    border:none;
    transition:0.3s;
}
.btn-pro:hover {
    transform: scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="wrapper">

<div class="card-box">

<!-- HEADER -->
<div class="brand">
    <i class="fas fa-university"></i>
    <h4>Open New Account</h4>
    <small>Create user account (Admin)</small>
</div>

<!-- ALERT -->
<div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
<div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

<!-- FORM -->
<form th:action="@{/admin/open-account}" th:object="${user}" method="post">

    <input type="text" th:field="*{name}" class="form-control mb-3" placeholder="👤 Full Name" required>

    <input type="text" th:field="*{mobile}" class="form-control mb-3" placeholder="📱 Mobile Number" required>

    <input type="email" th:field="*{email}" class="form-control mb-3" placeholder="📧 Email" required>

    <input type="password" th:field="*{pin}" maxlength="4" class="form-control mb-3" placeholder="🔐 4 Digit PIN" required>

    <input type="number" name="initialDeposit" class="form-control mb-4" placeholder="💰 Initial Deposit" required>

    <button class="btn btn-pro w-100">
        ➕ Create Account
    </button>

</form>

<!-- BACK -->
<div class="text-center mt-3">
    <a href="/admin/dashboard" class="text-info">⬅ Back to Dashboard</a>
</div>

</div>

</div>

</body>
</html>
