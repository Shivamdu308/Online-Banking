<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MyBank | Forgot PIN</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Segoe UI';
    background: url('https://images.unsplash.com/photo-1537724326059-2ea20251b9c8')
                no-repeat center/cover;
}

/* OVERLAY */
.overlay {
    min-height:100vh;
    background: rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card-box {
    width:100%;
    max-width:380px;
    padding:30px;
    border-radius:20px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    color:white;
}

/* BRAND */
.brand {
    text-align:center;
    margin-bottom:15px;
}

.brand i {
    font-size:35px;
    color:#00c6ff;
}

/* INPUT */
.form-control {
    background: rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}

.form-control:focus {
    box-shadow:0 0 8px #00c6ff;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    border:none;
}

/* NOTE */
.note {
    font-size:12px;
    text-align:center;
    opacity:0.8;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card-box">

<!-- HEADER -->
<div class="brand">
    <i class="fas fa-university"></i>
    <h4>MyBank</h4>
    <p class="small">Reset your PIN via Email OTP</p>
</div>

<!-- NOTE -->
<div class="note">
    Enter your registered email. OTP will be sent instantly.
</div>

<!-- ALERTS -->
<div th:if="${error}" class="alert alert-danger py-2 text-center small">
    <span th:text="${error}"></span>
</div>

<div th:if="${message}" class="alert alert-success py-2 text-center small">
    <span th:text="${message}"></span>
</div>

<!-- FORM -->
<form th:action="@{/send-otp}" method="post" onsubmit="return validateEmail()">

    <div class="mb-3">
        <input type="email" name="email" id="email"
               class="form-control text-center"
               placeholder="Enter registered email"
               required>
    </div>

    <button id="btn" class="btn btn-primary w-100">
        <i class="fas fa-paper-plane"></i> Send OTP
    </button>

</form>

<!-- BACK -->
<div class="text-center mt-3">
    <a th:href="@{/login}">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>
</div>

</div>
</div>

<!-- JS -->
<script>

// EMAIL VALIDATION + LOADING
function validateEmail(){
    let email = document.getElementById("email").value;

    if(!email.includes("@")){
        alert("Enter valid email");
        return false;
    }

    let btn = document.getElementById("btn");
    btn.innerText = "Sending...";
    btn.disabled = true;

    return true;
}

</script>

</body>
</html>
