<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>MyBank Passbook</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e2e8f0;
}

/* HEADER */
.header {
    background: rgba(255,255,255,0.05);
    padding: 22px;
    border-radius: 20px;
    margin-bottom: 25px;
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* GLASS CARD */
.glass {
    background: rgba(255,255,255,0.04);
    padding: 22px;
    border-radius: 20px;
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 15px 35px rgba(0,0,0,0.6);
    transition: 0.3s ease;
}

.glass:hover {
    transform: translateY(-3px);
    box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 25px 60px rgba(0,0,0,0.8);
}

/* TABLE */
.table {
    color: #e2e8f0;
}

.table th {
    opacity: 0.6;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: 0.2s;
}

.table tbody tr:hover {
    background: rgba(255,255,255,0.05);
}

/* CREDIT / DEBIT */
.credit {
    color: #00ffa6;
    font-weight: 600;
}

.debit {
    color: #ff5c6c;
    font-weight: 600;
}

/* BUTTON */
.btn-pro {
    background: linear-gradient(135deg,#0ea5e9,#2563eb);
    border: none;
    color: white;
    border-radius: 25px;
    padding: 6px 18px;
    font-weight: 500;
    transition: 0.3s;
    box-shadow: 0 5px 20px rgba(0,114,255,0.4);
}

.btn-pro:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,114,255,0.6);
}

/* SUCCESS BUTTON */
.btn-success {
    border-radius: 25px;
    padding: 6px 18px;
    background: linear-gradient(135deg,#22c55e,#16a34a);
    border: none;
}

/* BACK BUTTON */
.btn-light {
    border-radius: 25px;
    padding: 6px 18px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: none;
}

/* TEXT */
h4, h5, h6 {
    font-weight: 500;
    letter-spacing: 0.3px;
}

</style>

</head>

<body>

<div class="container mt-4">

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">

    <div>
        <h4>📘 Digital Passbook</h4>

        <p>
            Account No:
            <b th:text="${account != null ? account.accountNumber : '-'}"></b><br>

            Name:
            <b th:text="${account != null && account.user != null ? account.user.name : '-'}"></b>
        </p>
    </div>

    <div>
        <button onclick="window.print()" class="btn btn-pro">🖨 Print</button>
        <a href="/download-pdf" class="btn btn-success">📄 PDF</a>
        <a href="/dashboard" class="btn btn-light">← Back</a>
    </div>

</div>

<!-- ERROR -->
<div th:if="${error}" class="alert alert-danger text-center">
    <span th:text="${error}"></span>
</div>

<!-- SUMMARY -->
<div class="row mb-4">

    <div class="col-md-4">
        <div class="glass text-center">
            <h6>Total Balance</h6>
            <h3 th:text="${account != null ? '₹ ' + account.balance : '₹ 0'}"></h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass text-center">
            <h6>Total Credit</h6>
            <h3 class="credit"
                th:text="'₹ ' + (${totalCredit} != null ? ${totalCredit} : 0)">
            </h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass text-center">
            <h6>Total Debit</h6>
            <h3 class="debit"
                th:text="'₹ ' + (${totalDebit} != null ? ${totalDebit} : 0)">
            </h3>
        </div>
    </div>

</div>

<!-- TABLE -->
<div class="glass">

    <h5 class="mb-3">Transaction History</h5>

    <table class="table table-borderless">

        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Mode</th>
            </tr>
        </thead>

        <tbody>

            <tr th:if="${transactions != null}" th:each="txn : ${transactions}">

                <td th:text="${txn.timestamp != null ? #temporals.format(txn.timestamp,'dd-MM-yyyy HH:mm') : '-'}"></td>

                <td th:text="${txn.description != null ? txn.description : '-'}"></td>

                <td th:text="${txn.type != null ? txn.type : '-'}"></td>

                <td th:text="'₹ ' + ${txn.amount}"
                    th:classappend="${txn.type != null && txn.type.name()=='CREDIT'} ? 'credit' : 'debit'">
                </td>

                <td>
                    <span th:text="${txn.mode != null ? txn.mode : '-'}"></span>
                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(transactions)}">
                <td colspan="5" class="text-center">No Transactions Found</td>
            </tr>

        </tbody>

    </table>

</div>

</div>

</body>
</html>
